# Input YAML for hercules
# Explicitly specify the parameters for demonstration purposes

# Name
name: example_08

###
# Describe this simulation setup
description: Combined Cycle Gas Turbine (CCGT) Example

dt: 60.0  # 1 minute time step
starttime_utc: "2020-01-01T00:00:00Z"  # Midnight Jan 1, 2020 UTC
endtime_utc: "2020-01-01T12:00:00Z"  # 12 hours later
verbose: False
log_every_n: 1

plant:
  interconnect_limit: 100000  # kW (100 MW)

combined_cycle_gas_turbine:
  component_type: CombinedCycleGasTurbine
  rated_capacity: 100000  # kW (100 MW)
  min_stable_load_fraction: 0.4  # 40% minimum operating point
  ramp_rate_fraction: 0.03  # 3%/min ramp rate
  run_up_rate_fraction: 0.02  # 2%/min run up rate
  hot_startup_time: 4500.0  # 1.25 hours
  warm_startup_time: 7200.0  # 2 hours
  cold_startup_time: 14400.0  # 4 hours

  # Steam turbine startup times are initial estimates--find data to refine these
  steam_turbine_capacity_factor: 0.3  # Assume steam turbine is 30% of total capacity
  hot_startup_time_st: 1800.0  # 0.5 hours
  warm_startup_time_st: 3600.0  # 2 hours
  cold_startup_time_st: 14400.0  # 4 hours
  ramp_rate_fraction_st: 0.03  # 3%/min ramp rate for steam turbine
  run_up_rate_fraction_st: 0.02  # 2%/min run up rate for steam turbine
  
  min_up_time: 14400  # 4 hours
  min_down_time: 7200  # 2 hours
  # Natural gas properties from [6] Staffell, "The Energy and Fuel Data Sheet", 2011
  # HHV: 39.05 MJ/m³, Density: 0.768 kg/m³
  hhv: 39050000  # J/m³ for natural gas (39.05 MJ/m³) [6]
  fuel_density: 0.768  # kg/m³ for natural gas [6]
  efficiency_table:
    power_fraction:
      - 1.0
      - 0.95
      - 0.90
      - 0.85
      - 0.80
      - 0.75
      - 0.7
      - 0.65
      - 0.6
      - 0.55
      - 0.50
      - 0.4
    efficiency:
      - 0.53
      - 0.525
      - 0.52
      - 0.52
      - 0.52
      - 0.52
      - 0.52
      - 0.515
      - 0.505
      - 0.5
      - 0.49
      - 0.47
  log_channels:
    - power
    - fuel_volume_rate
    - fuel_mass_rate
    - state
    - efficiency
    - power_setpoint
    - time_in_state
  initial_conditions:
    power: 0  # Start OFF
    down_time: 144001

controller:

