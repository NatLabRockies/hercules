# Input YAML for hercules

# Name
name: example_03

###
# Describe this emulator setup
description: Wind and solar

dt: 1.0
starttime: 0.0
endtime: 950.0
verbose: False


plant:
  interconnect_limit: 5000 # kW


wind_farm: # The name of the Wind_MesoToPower wind farm
  component_type: Wind_MesoToPower
  floris_input_file: inputs/floris_input.yaml
  wind_input_filename: inputs/wind_input.p
  turbine_file_name: inputs/turbine_filter_model.yaml
  log_file_name: outputs/log_wind_sim.log
  floris_update_time_s: 300.0 # Update wakes every 5 minutes

battery:
  component_type: BatterySimple
  size: 2  # MW size of the battery
  energy_capacity: 2 # total capacity of the battery in MWh
  charge_rate: 2 # charge rate in MW
  discharge_rate: 2 # discharge rate in MW
  max_SOC: 0.9
  min_SOC: 0.1
  allow_grid_power_consumption: False
  initial_conditions:
    SOC: 0.5

controller:




