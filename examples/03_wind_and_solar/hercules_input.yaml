# Input YAML for hercules

# Name
name: example_03

###
# Describe this emulator setup
description: Wind and solar

dt: 1.0
starttime: 0.0
endtime: 950.0
verbose: False


plant:
  interconnect_limit: 2000 # kW


wind_farm: # The name of the Wind_MesoToPower wind farm
  component_type: Wind_MesoToPower
  floris_input_file: inputs/floris_input.yaml
  wind_input_filename: inputs/wind_input.p
  turbine_file_name: inputs/turbine_filter_model.yaml
  log_file_name: outputs/log_wind_sim.log

solar_farm: # The name of component object 1
  component_type: SolarPySAMPVWatts
  solar_input_filename: inputs/solar_input.p
  lat: 39.7442
  lon: -105.1778
  elev: 1829
  target_system_capacity: 3000
  target_dc_ac_ratio: 1.33

  initial_conditions:

    power: 3000 # kW
    dni: 1000
    poa: 1000


controller:




