# Input YAML for hercules

# Name
name: example_013

###
# Describe this emulator setup
description: Long run Only

dt: 1.0
starttime: 0.0
endtime: 950.0 #30.0 #950.0
verbose: False


plant:
  interconnect_limit: 30000 # kW


wind_farm: # The name of the WindSimLongTerm wind farm
  py_sim_type: WindSimLongTerm
  floris_input_file: inputs/floris_input.yaml
  wind_input_filename: inputs/wind_input.p
  turbine_file_name: inputs/turbine_filter_model.yaml
  log_file_name: outputs/log_wind_sim.log

solar_farm: # The name of py_sim object 1
  py_sim_type: SolarPySAM
  pysam_model: pvwatts #pvsam or pvwatts
  solar_input_filename: inputs/solar_input.p
  lat: 39.7442
  lon: -105.1778
  elev: 1829
  target_system_capacity: 10000
  target_dc_ac_ratio: 1.33

  initial_conditions:

    power: 2000 # kW
    dni: 1000
    poa: 1000


controller:




